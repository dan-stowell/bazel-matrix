rewrite ^https://sourceware.org/elfutils/ftp/(.*)$ https://mirrors.kernel.org/sourceware/elfutils/$1
rewrite ^https://sourceware.org/elfutils/ftp/(.*)$ https://sourceware.org/elfutils/ftp/$1
# kernel.org prunes superseded point releases; fall back to the Internet
# Archive's copy (identical bytes, verified by the pinned integrity hash).
rewrite ^https://cdn.kernel.org/pub/linux/kernel/(.*)$ https://cdn.kernel.org/pub/linux/kernel/$1
rewrite ^https://cdn.kernel.org/pub/linux/kernel/(.*)$ https://web.archive.org/web/2026id_/https://cdn.kernel.org/pub/linux/kernel/$1
